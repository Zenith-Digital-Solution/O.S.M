# Domain-aware RBAC model.
# In this project the domain maps to the organization slug stored on `tenant`.
# Request:   (subject, domain, object, action)
# Policy:    (role, domain, object, action)
# Grouping:  (user, role, domain)

[request_definition]
r = sub, dom, obj, act

[policy_definition]
p = sub, dom, obj, act

[role_definition]
g = _, _, _

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
# A request is allowed when:
# 1. the user is linked to the policy role in the same domain, and
# 2. the requested resource and action exactly match the policy row.
# This model intentionally does not use wildcards or regex matching yet.
m = g(r.sub, p.sub, r.dom) && r.dom == p.dom && r.obj == p.obj && r.act == p.act
