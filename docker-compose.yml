services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: template
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    environment:
      DEBUG: "False"
      TESTING: "False"
      POSTGRES_SERVER: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: template
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db/template
      SYNC_DATABASE_URL: postgresql://postgres:postgres@db/template
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      BACKEND_CORS_ORIGINS: http://localhost:3000
      SERVER_HOST: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run uvicorn src.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./backend
    environment:
      DEBUG: "False"
      TESTING: "False"
      POSTGRES_SERVER: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: template
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db/template
      SYNC_DATABASE_URL: postgresql://postgres:postgres@db/template
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    command: uv run celery -A src.apps.core.celery_app worker --loglevel=info
    depends_on:
      - backend
      - redis

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_ANALYTICS_ENABLED: "false"
    command: sh -c "npm ci && npm run dev -- --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
